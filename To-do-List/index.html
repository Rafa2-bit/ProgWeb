<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Tarefas Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div>
            <h1>Minhas Tarefas</h1>
            <p>Organize suas atividades do dia a dia com facilidade.</p>
        </div>
        <button id="toggle-theme">Dark Mode</button>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>Nova Tarefa</h2>
            <form id="task-form">
                <div class="form-group">
                    <label for="task-name">Nome da Tarefa:</label>
                    <input type="text" id="task-name" required placeholder="Ex: Estudar JavaScript">
                </div>
                
                <div class="form-group">
                    <label for="task-category">Categoria:</label>
                    <select id="task-category" required>
                        <option value="">Selecione...</option>
                        <option value="Trabalho">Trabalho</option>
                        <option value="Estudos">Estudos</option>
                        <option value="Pessoal">Pessoal</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="task-priority">Prioridade:</label>
                    <select id="task-priority" required>
                        <option value="">Selecione...</option>
                        <option value="Alta">Alta</option>
                        <option value="Média">Média</option>
                        <option value="Baixa">Baixa</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="task-date">Data Limite:</label>
                    <input type="date" id="task-date" required>
                </div>

                <button type="submit" class="btn-submit">Adicionar Tarefa</button>
            </form>
        </section>

        <section class="list-section">
            <div class="controls">
                <div class="filters">
                    <label for="filter-category">Filtrar por:</label>
                    <select id="filter-category">
                        <option value="Todas">Todas as Categorias</option>
                        <option value="Trabalho">Trabalho</option>
                        <option value="Estudos">Estudos</option>
                        <option value="Pessoal">Pessoal</option>
                    </select>
                </div>
                
                <div class="sorting">
                    <label for="sort-tasks">Ordenar por:</label>
                    <select id="sort-tasks">
                        <option value="date-asc">Data (Mais próximas)</option>
                        <option value="date-desc">Data (Mais distantes)</option>
                        <option value="priority">Prioridade</option>
                    </select>
                </div>
            </div>

            <div class="counters">
                <span id="count-pending">Pendentes: 0</span> | 
                <span id="count-completed">Concluídas: 0</span>
            </div>

            <div id="task-list" class="task-grid">
                </div>
            <p id="empty-message" class="hidden">Nenhuma tarefa encontrada.</p>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
